<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Recomp Tracker — One Stop Diet</title>
<style>
  :root{
    --bg:#0f1117; --bg2:#161a22; --bg3:#1d222d; --card:#1a1f2a; --line:#2a3140;
    --txt:#e8e4da; --txt2:#9aa3b2; --txt3:#6a7384;
    --amber:#e0a850; --amber2:#f0c070; --green:#4caf7d; --green2:#5fd49a;
    --red:#e06b5a; --blue:#5a9fd4; --purple:#9b7fd4; --orange:#e08850;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
  #app{max-width:560px;margin:0 auto;padding-bottom:78px;min-height:100vh;}
  h1,h2,h3{margin:0;font-weight:700;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select{font-family:inherit;font-size:15px;}
  .hide{display:none!important;}

  /* Header */
  .hdr{background:linear-gradient(135deg,#1c1408,#241a0c);padding:calc(env(safe-area-inset-top) + 14px) 18px 14px;
    border-bottom:1px solid #2e2410;position:sticky;top:0;z-index:50;}
  .hdr-row{display:flex;justify-content:space-between;align-items:center;}
  .hdr-title{font-size:18px;color:var(--amber2);letter-spacing:.3px;}
  .hdr-sub{font-size:11px;color:#9a875a;margin-top:1px;}
  .sync-pill{display:flex;align-items:center;gap:5px;background:#241a0c;border:1px solid #3a2c12;
    border-radius:20px;padding:4px 10px;font-size:11px;color:#b59860;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#6a7384;}
  .sync-dot.ok{background:var(--green2);box-shadow:0 0 6px var(--green2);}
  .sync-dot.err{background:var(--red);}
  .sync-dot.local{background:var(--amber);}

  /* Pages */
  .page{padding:16px 14px;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card-t{font-size:13px;color:var(--txt2);font-weight:700;margin-bottom:12px;letter-spacing:.3px;text-transform:uppercase;}
  .sec-t{font-size:16px;color:var(--amber2);margin:18px 4px 10px;}

  /* Date nav */
  .datenav{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);
    border:1px solid var(--line);border-radius:12px;padding:8px 6px;margin-bottom:14px;}
  .datenav button{padding:8px 14px;font-size:18px;color:var(--txt2);border-radius:8px;}
  .datenav-c{text-align:center;}
  .datenav-d{font-size:15px;font-weight:700;}
  .datenav-s{font-size:11px;color:var(--txt3);}

  /* Calorie ring */
  .ring-wrap{display:flex;align-items:center;gap:18px;}
  .ring-info{flex:1;}
  .ring-big{font-size:32px;font-weight:800;color:var(--amber2);line-height:1;}
  .ring-lbl{font-size:12px;color:var(--txt3);margin-top:3px;}
  .ring-meta{display:flex;gap:14px;margin-top:10px;font-size:12px;}
  .ring-meta span b{color:var(--txt);}
  .ring-meta .in b{color:var(--green2);} .ring-meta .out b{color:var(--orange);}

  /* Macro bars */
  .macro{margin-bottom:11px;}
  .macro-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .macro-top .nm{color:var(--txt2);font-weight:600;}
  .macro-top .vl{color:var(--txt3);}
  .bar{height:8px;background:var(--bg3);border-radius:6px;overflow:hidden;}
  .bar i{display:block;height:100%;border-radius:6px;transition:width .5s ease;}

  /* Water */
  .water-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .water-big{font-size:24px;font-weight:800;color:var(--blue);}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
  .chip{background:var(--bg3);border:1px solid var(--line);border-radius:18px;padding:7px 13px;font-size:13px;color:var(--txt2);font-weight:600;}
  .chip:active{background:var(--line);}
  .chip.blue{border-color:#2a4a66;color:var(--blue);}
  .chip.red{border-color:#5a2e2a;color:var(--red);}
  .chip.green{border-color:#2a5240;color:var(--green2);}

  /* Buttons */
  .btn{display:block;width:100%;background:linear-gradient(135deg,var(--amber),#d4943c);color:#1a1206;
    font-weight:700;padding:13px;border-radius:11px;font-size:15px;text-align:center;}
  .btn:active{opacity:.85;}
  .btn-2{background:var(--bg3);border:1px solid var(--line);color:var(--txt);}
  .btn-g{background:linear-gradient(135deg,var(--green),#3a9e6e);color:#06140d;}
  .btn-sm{padding:9px;font-size:13px;}
  .btn-row{display:flex;gap:8px;}
  .btn-row>*{flex:1;}

  /* Inputs */
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:5px;font-weight:600;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);
    border-radius:10px;padding:11px 12px;color:var(--txt);outline:none;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amber);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}

  /* Food log */
  .food-item{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);
    border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .food-l .nm{font-weight:600;font-size:14px;}
  .food-l .mc{font-size:11px;color:var(--txt3);margin-top:2px;}
  .food-r{display:flex;align-items:center;gap:8px;}
  .food-cal{font-weight:700;color:var(--amber2);font-size:14px;}
  .xbtn{color:var(--red);font-size:18px;padding:2px 6px;background:var(--bg3);border-radius:6px;}
  .food-db-item{display:flex;justify-content:space-between;align-items:center;padding:10px;
    border-bottom:1px solid var(--line);}
  .food-db-item:active{background:var(--bg2);}

  /* Charts */
  .chart-box{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 8px 6px;margin-bottom:12px;}
  .chart-title{font-size:12px;color:var(--txt2);font-weight:700;margin:0 6px 8px;display:flex;justify-content:space-between;}
  .chart-title .avg{color:var(--txt3);font-weight:500;}
  svg.chart{width:100%;display:block;}
  .rangebtns{display:flex;gap:6px;margin-bottom:12px;}
  .rangebtns button{flex:1;padding:8px;background:var(--bg2);border:1px solid var(--line);
    border-radius:8px;font-size:12px;color:var(--txt2);font-weight:600;}
  .rangebtns button.on{background:#2a2010;border-color:var(--amber);color:var(--amber2);}

  /* Reminders */
  .rem-item{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line);
    border-radius:11px;padding:12px;margin-bottom:9px;}
  .rem-time{font-size:18px;font-weight:800;color:var(--amber2);min-width:54px;}
  .rem-info{flex:1;min-width:0;}
  .rem-nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .rem-days{font-size:10px;color:var(--txt3);margin-top:2px;}
  .switch{position:relative;width:44px;height:25px;flex-shrink:0;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .sl{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--line);
    border-radius:25px;transition:.3s;}
  .switch .sl:before{content:"";position:absolute;width:19px;height:19px;left:2px;top:2px;
    background:var(--txt3);border-radius:50%;transition:.3s;}
  .switch input:checked + .sl{background:#2a5240;border-color:var(--green);}
  .switch input:checked + .sl:before{transform:translateX(19px);background:var(--green2);}

  /* Research */
  .pill-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch;}
  .pill-row::-webkit-scrollbar{display:none;}
  .rpill{white-space:nowrap;background:var(--bg2);border:1px solid var(--line);border-radius:18px;
    padding:7px 13px;font-size:12px;color:var(--txt2);font-weight:600;flex-shrink:0;}
  .rpill.on{background:#241a0c;border-color:var(--amber);color:var(--amber2);}
  .paper{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--amber);
    border-radius:10px;padding:12px;margin-bottom:9px;}
  .paper-top{display:flex;gap:7px;align-items:center;margin-bottom:5px;flex-wrap:wrap;}
  .tag{font-size:9px;font-weight:700;letter-spacing:.4px;padding:2px 6px;border-radius:3px;}
  .paper-auth{font-size:13px;font-weight:700;color:#c9b88a;}
  .paper-inst{font-size:11px;color:var(--blue);font-style:italic;margin:2px 0 4px;}
  .paper-find{font-size:12px;color:#a8b89a;line-height:1.6;background:#0f1620;border-radius:6px;padding:9px;margin-top:7px;}
  .finding-card{display:flex;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:9px;}
  .finding-emo{font-size:22px;flex-shrink:0;}

  /* Tools */
  .tool{display:flex;align-items:center;gap:13px;background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:14px;margin-bottom:10px;text-decoration:none;color:var(--txt);}
  .tool:active{background:var(--bg3);}
  .tool-ic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .tool-nm{font-weight:700;font-size:15px;}
  .tool-ds{font-size:12px;color:var(--txt3);margin-top:1px;}
  .tool-ar{color:var(--txt3);font-size:18px;}

  /* Bottom nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(18,22,30,.96);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);z-index:60;}
  .nav button{flex:1;padding:8px 0 6px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--txt3);}
  .nav button.on{color:var(--amber2);}
  .nav .ni{font-size:17px;}
  .nav .nl{font-size:7.5px;font-weight:600;letter-spacing:-.3px;}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;
    animation:fade .2s;}
  .modal-c{background:var(--bg2);border-top-left-radius:20px;border-top-right-radius:20px;
    width:100%;max-width:560px;margin:0 auto;max-height:88vh;overflow-y:auto;padding:18px 16px calc(env(safe-area-inset-bottom) + 20px);
    animation:slideup .3s ease;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-h h3{font-size:17px;}
  .modal-x{font-size:24px;color:var(--txt3);padding:0 4px;}

  .note{font-size:12px;color:var(--txt3);line-height:1.6;background:var(--bg);border:1px solid var(--line);
    border-radius:9px;padding:11px;}
  .note b{color:var(--amber2);}
  .step{display:flex;gap:9px;margin-bottom:9px;font-size:12px;color:var(--txt2);line-height:1.55;}
  .step-n{background:var(--amber);color:#1a1206;width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
  .tierbox{margin-bottom:13px;}
  .tier-t{font-size:12px;font-weight:700;margin-bottom:6px;}
  .tier-items{display:flex;flex-wrap:wrap;gap:5px;}
  .tier-i{font-size:11px;border-radius:4px;padding:4px 9px;}
  .day-pick{display:flex;gap:5px;}
  .day-pick button{flex:1;padding:8px 0;background:var(--bg);border:1px solid var(--line);
    border-radius:7px;font-size:11px;color:var(--txt3);font-weight:700;}
  .day-pick button.on{background:#2a2010;border-color:var(--amber);color:var(--amber2);}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);
    color:#06140d;padding:11px 20px;border-radius:24px;font-weight:700;font-size:13px;z-index:200;
    box-shadow:0 6px 20px rgba(0,0,0,.4);animation:fade .3s;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center;}
  .stat-v{font-size:22px;font-weight:800;}
  .stat-l{font-size:11px;color:var(--txt3);margin-top:2px;}
  .meal-tpl{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px;}
  .meal-tpl-h{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--amber2);margin-bottom:5px;}
  .meal-tpl-b{font-size:12px;color:var(--txt2);line-height:1.6;}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-title">⚡ Recomp Tracker</div>

  <button data-p="settings"><span class="ni">⚙️</span><span class="nl">Atur</span></button>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ============ SAFE STORAGE (iOS Safari private mode can throw) ============ */
const _mem={};
const LS={
  getItem(k){try{const v=localStorage.getItem(k);return v!==null?v:(k in _mem?_mem[k]:null);}catch(e){return k in _mem?_mem[k]:null;}},
  setItem(k,v){_mem[k]=v;try{localStorage.setItem(k,v);}catch(e){}},
  removeItem(k){delete _mem[k];try{localStorage.removeItem(k);}catch(e){}}
};

/* ============ STATE ============ */
const LS_KEY='recompTrackerV2';
const LS_SYNC='recompSyncCfg';
const DEVICE_ID = (function(){let d=LS.getItem('recompDevId');if(!d){d='dev_'+Math.random().toString(36).slice(2,9);LS.setItem('recompDevId',d);}return d;})();

const FOOD_DB_DEFAULT=[
  {nm:'Dada ayam (100g)',cal:165,p:31,c:0,f:3.6,s:0,na:74,fib:0},
  {nm:'Dada ayam (200g)',cal:330,p:62,c:0,f:7.2,s:0,na:148,fib:0},
  {nm:'Kentang rebus (100g)',cal:87,p:2,c:20,f:0.1,s:0.9,na:4,fib:1.8},
  {nm:'Kentang rebus (150g)',cal:130,p:3,c:30,f:0.2,s:1.3,na:6,fib:2.7},

  {nm:'Telur (3 butir)',cal:216,p:19,c:1.2,f:14.4,s:0.6,na:213,fib:0},
  {nm:'Whey protein (1 scoop)',cal:120,p:24,c:3,f:1.5,s:2,na:60,fib:0},
  {nm:'Susu UHT full (250ml)',cal:150,p:8,c:12,f:8,s:12,na:105,fib:0},

const DEFAULT_REMINDERS=[
  {id:'r1',time:'06:00',nm:'🍌 Pisang + air sebelum gym',days:[1,2,3,4,5,6],on:true},
  {id:'r2',time:'07:00',nm:'💪 Waktunya gym (kalau sempat)',days:[1,3,5],on:true},

  {id:'r7',time:'21:00',nm:'🥛 Susu + siap-siap tidur',days:[0,1,2,3,4,5,6],on:true},
  {id:'r8',time:'10:00',nm:'💧 Cek minum air sudah cukup?',days:[0,1,2,3,4,5,6],on:false}

function defaultState(){return{
  profile:{name:'Ahmad',startWeight:86,targetWeight:65,height:170,age:25,sex:'male',activity:1.375,
    calTarget:1800,pTarget:165,cTarget:150,fTarget:55,sugarLimit:50,waterTarget:2500,sodiumLimit:2000,fiberTarget:35,deficitPct:20},
  days:{}, customFoods:[], customActivities:[], expenses:[], reminders:JSON.parse(JSON.stringify(DEFAULT_REMINDERS)),
  lastUpdated:0, deviceId:DEVICE_ID
};}

let state=defaultState();
let curDate=todayStr();
let curPage='home';
let chartRange=14;
let foodTab='quick';
let expMonth=todayStr().slice(0,7);

/* ============ UTIL ============ */
function todayStr(d){d=d||new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function parseDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtDate(s){const d=parseDate(s);const days=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const mon=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return days[d.getDay()]+', '+d.getDate()+' '+mon[d.getMonth()];}
function isToday(s){return s===todayStr();}

/* ---- Expenses helpers ---- */
const MON_SHORT=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
const EXP_CATS=[['Makanan','var(--green2)'],['Suplemen','var(--amber2)'],['Gym','var(--blue)'],['Peralatan','var(--purple)'],['Lainnya','var(--txt3)']];
const EXP_CAT_COL={'Makanan':'var(--green2)','Suplemen':'var(--amber2)','Gym':'var(--blue)','Peralatan':'var(--purple)','Lainnya':'var(--txt3)'};
function fmtRp(n){return num(n).toLocaleString('id-ID');}
function monthLabel(ym){const m=parseInt(ym.split('-')[1],10);return MON_SHORT[m-1]||ym;}
function monthFull(ym){const p=ym.split('-');return (MON_SHORT[parseInt(p[1],10)-1]||'')+' '+p[0];}
function normalizeExpense(e){e=e||{};
  return{id:e.id||((e.d||e.date||'')+'|'+(e.n||e.nm||e.name||'')+'|'+(e.amt!==undefined?e.amt:e.amount)),
    d:e.d||e.date||todayStr(),n:String(e.n||e.nm||e.name||'Pengeluaran'),
    amt:num(e.amt!==undefined?e.amt:e.amount),cat:e.cat||e.category||'Lainnya',recur:e.recur||'no'};}
function monthExpenses(ym){return state.expenses.filter(e=>String(e.d).slice(0,7)===ym).sort((a,b)=>String(b.d).localeCompare(String(a.d)));}
function monthTotal(ym){return monthExpenses(ym).reduce((a,e)=>a+num(e.amt),0);}
function last6MonthsEnding(ym){const y=parseInt(ym.split('-')[0],10),m=parseInt(ym.split('-')[1],10);const res=[];
  for(let i=5;i>=0;i--){const d=new Date(y,m-1-i,1);res.push(d.getFullYear()+'-'+pad(d.getMonth()+1));}return res;}
function shiftExpMonth(dir){const y=parseInt(expMonth.split('-')[0],10),m=parseInt(expMonth.split('-')[1],10);
  const d=new Date(y,m-1+dir,1);const ns=d.getFullYear()+'-'+pad(d.getMonth()+1);
  if(ns>todayStr().slice(0,7))return;expMonth=ns;render();}
function num(v){const n=parseFloat(v);return isNaN(n)?0:n;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

/* Convert any food item (old "n/c/cb" or new "nm/cal/c") to new shape.
   IMPORTANT: in old format c=calories, cb=carbs; in new format cal=calories, c=carbs. */
function normalizeFood(f){f=f||{};
  if(f.nm!==undefined||f.cal!==undefined){
    return{nm:String(f.nm||f.n||'Makanan'),cal:num(f.cal),p:num(f.p),c:num(f.c),f:num(f.f),s:num(f.s),na:num(f.na),fib:num(f.fib)};}
  // legacy item
  return{nm:String(f.n||'Makanan'),cal:num(f.c),p:num(f.p),c:num(f.cb),f:num(f.f),s:num(f.s),na:num(f.na),fib:num(f.fib)};}

/* Convert any activity item (old "n/c/s" or new "nm/cal/steps") to new shape.
   Old: n=name, c=calories, s=steps.  New: nm=name, cal=calories, steps=steps. */
function normalizeActivity(a){a=a||{};
  if(a.nm!==undefined||a.cal!==undefined){
    return{nm:String(a.nm||a.n||'Aktivitas'),cal:num(a.cal),steps:num(a.steps!==undefined?a.steps:a.s),mins:num(a.mins),km:num(a.km)};}
  return{nm:String(a.n||'Aktivitas'),cal:num(a.c),steps:num(a.s),mins:num(a.mins),km:num(a.km)};}

/* Convert any day object to the new shape (handles legacy "food"/"activity" and intermediate burned/steps). */
function migrateDay(od){od=od||{};
  const nd={foods:[],water:num(od.water),activities:[],
    weight:(od.weight!=null?num(od.weight):null),waist:(od.waist!=null?num(od.waist):null)};
  const src=Array.isArray(od.foods)?od.foods:(Array.isArray(od.food)?od.food:[]);
  nd.foods=src.map(normalizeFood);
  if(Array.isArray(od.activities))nd.activities=od.activities.map(normalizeActivity);
  else if(Array.isArray(od.activity))nd.activities=od.activity.map(normalizeActivity);
  else{const b=num(od.burned),s=num(od.steps);if(b||s)nd.activities=[{nm:'Aktivitas',cal:b,steps:s}];}
  return nd;}

function getDay(date){date=date||curDate;
  let d=state.days[date];
  if(!d||typeof d!=='object'||!Array.isArray(d.foods)||!Array.isArray(d.activities)||Array.isArray(d.activity)||d.food!==undefined||d.burned!==undefined){
    d=migrateDay(d);state.days[date]=d;}
  if(typeof d.water!=='number')d.water=num(d.water);
  if(d.weight===undefined)d.weight=null;
  if(d.waist===undefined)d.waist=null;
  return d;}

function dayBurned(date){return (getDay(date).activities||[]).reduce((a,x)=>a+num(x.cal),0);}
function daySteps(date){return (getDay(date).activities||[]).reduce((a,x)=>a+num(x.steps),0);}

function dayTotals(date){const d=getDay(date);let cal=0,p=0,c=0,f=0,s=0,na=0,fib=0;
  (d.foods||[]).forEach(it=>{cal+=num(it.cal);p+=num(it.p);c+=num(it.c);f+=num(it.f);s+=num(it.s);na+=num(it.na);fib+=num(it.fib);});
  return{cal,p,c,f,s,na,fib};}

function bmr(){const pf=state.profile;const w=lastWeight();
  let b=10*w+6.25*pf.height-5*pf.age;b+=pf.sex==='male'?5:-161;return Math.round(b);}
function tdee(){return Math.round(bmr()*state.profile.activity);}
function lastWeight(){
  const dates=Object.keys(state.days).filter(d=>state.days[d].weight).sort();
  if(dates.length)return num(state.days[dates[dates.length-1]].weight);
  return num(state.profile.startWeight);}

function save(){state.lastUpdated=Date.now();state.deviceId=DEVICE_ID;
  try{LS.setItem(LS_KEY,JSON.stringify(state));}catch(e){console.warn(e);}
  pushCloudDebounced();}

function load(){try{const r=LS.getItem(LS_KEY);if(r){const d=JSON.parse(r);
  state=Object.assign(defaultState(),d);
  state.profile=Object.assign(defaultState().profile,d.profile||{});
  if(!state.reminders||!state.reminders.length)state.reminders=JSON.parse(JSON.stringify(DEFAULT_REMINDERS));
}}catch(e){console.warn(e);}}

/* ============ CLOUD SYNC (Firebase) ============ */
let db=null,syncOn=false,syncCode='',unsub=null,applyingCloud=false,pushTimer=null;
function loadSyncCfg(){try{return JSON.parse(LS.getItem(LS_SYNC))||{};}catch(e){return{};}}
function saveSyncCfg(c){LS.setItem(LS_SYNC,JSON.stringify(c));}

function setSync(status,msg){const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(!dot)return;dot.className='sync-dot '+status;
  txt.textContent=msg||(status==='ok'?'Tersync':status==='err'?'Error':status==='local'?'Lokal':'...');}

function initFirebase(){const cfg=loadSyncCfg();
  if(!cfg.enabled||!cfg.config||!cfg.code){setSync('local','Lokal');return;}
  if(typeof firebase==='undefined'){setSync('err','SDK gagal load (cek internet)');return;}
  try{
    const config=typeof cfg.config==='string'?JSON.parse(cfg.config):cfg.config;
    if(!firebase.apps.length)firebase.initializeApp(config);
    db=firebase.firestore();syncCode=cfg.code.trim();syncOn=true;
    setSync('ok','Menyambung...');startCloud();
  }catch(e){console.error(e);setSync('err','Config salah');}
}
function startCloud(){if(!db||!syncCode)return;
  pullCloud();
  if(unsub)unsub();
  unsub=db.collection('recompTrackers').doc(syncCode).onSnapshot(doc=>{
    if(doc.exists){const cd=doc.data();
      if(cd.deviceId!==DEVICE_ID && (cd.lastUpdated||0)>(state.lastUpdated||0)){
        applyingCloud=true;applyCloud(cd);applyingCloud=false;
        render();showToast('🔄 Data tersinkron dari perangkat lain');
      }}
    setSync('ok','Tersync');
  },err=>{console.error(err);setSync('err',err.code||'Error');});
}
function pullCloud(){if(!db||!syncCode)return;
  db.collection('recompTrackers').doc(syncCode).get().then(doc=>{
    if(doc.exists){const cd=doc.data();
      if((cd.lastUpdated||0)>(state.lastUpdated||0)){applyingCloud=true;applyCloud(cd);applyingCloud=false;render();}
      else{pushCloud();}
    }else{pushCloud();}
    setSync('ok','Tersync');
  }).catch(e=>{console.error(e);setSync('err','Gagal ambil');});
}
function applyCloud(cd){
  if(cd.profile)state.profile=Object.assign(defaultState().profile,cd.profile);
  if(cd.days)state.days=cd.days;
  if(cd.customFoods)state.customFoods=cd.customFoods;
  if(cd.reminders)state.reminders=cd.reminders;
  state.lastUpdated=cd.lastUpdated||Date.now();
  LS.setItem(LS_KEY,JSON.stringify(state));
}
function pushCloud(){if(!db||!syncCode||!syncOn||applyingCloud)return;
  const data=JSON.parse(JSON.stringify(state));data.lastUpdated=Date.now();data.deviceId=DEVICE_ID;
  state.lastUpdated=data.lastUpdated;
  db.collection('recompTrackers').doc(syncCode).set(data)
    .then(()=>setSync('ok','Tersync'))
    .catch(e=>{console.error(e);setSync('err','Gagal simpan');});
}
function pushCloudDebounced(){if(!syncOn)return;clearTimeout(pushTimer);pushTimer=setTimeout(pushCloud,1200);}

    <div class="card">

function ringSvg(pct,color){const r=42,c=2*Math.PI*r,off=c-(pct/100)*c;
  return `<svg width="96" height="96" viewBox="0 0 96 96" style="flex-shrink:0">
    <circle cx="48" cy="48" r="${r}" fill="none" stroke="#252b38" stroke-width="9"/>
    <circle cx="48" cy="48" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 48 48)" style="transition:stroke-dashoffset .6s"/>
    <text x="48" y="44" text-anchor="middle" fill="${color}" font-size="20" font-weight="800">${Math.round(pct)}%</text>
    <text x="48" y="60" text-anchor="middle" fill="#6a7384" font-size="9">net/target</text>
  </svg>`;}

function macroBar(nm,val,tgt,unit,col,bg,isLimit){const pct=clamp(val/tgt*100,0,100);
  return `<div class="macro">
    <div class="macro-top"><span class="nm">${nm}</span>
      <span class="vl">${Math.round(val)}${unit} / ${tgt}${unit}${isLimit?' (batas)':''}</span></div>
    <div class="bar"><i style="width:${pct}%;background:${col}"></i></div>
  </div>`;}

function shiftDate(dir){const d=parseDate(curDate);d.setDate(d.getDate()+dir);
  const ns=todayStr(d);if(parseDate(ns)>new Date())return;curDate=ns;render();}
function addWater(ml){const d=getDay();d.water=Math.max(0,num(d.water)+ml);save();
  // targeted update (no full re-render = no flicker)
  const v=document.getElementById('waterVal'),b=document.getElementById('waterBar');
  if(v&&b){v.textContent=num(d.water);b.style.width=clamp(num(d.water)/state.profile.waterTarget*100,0,100)+'%';

  else render();}
function openDatePicker(el){const inp=el.querySelector('input[type=date]');if(inp){if(inp.showPicker){try{inp.showPicker();}catch(e){inp.focus();inp.click();}}else{inp.focus();inp.click();}}}
function pickDate(v){if(!v)return;if(parseDate(v)>new Date())v=todayStr();curDate=v;render();}

/* ---- Smart Coach ---- */
function proteinSuggestion(gap){const opts=[['200g dada ayam',62],['1 scoop whey',24],['100g tempe',19],['3 telur',19],['250ml susu',8],['100g tahu',8]];
  let g=gap,parts=[];for(const o of opts){while(g>=o[1]*0.7&&parts.length<4){parts.push(o[0]+' ('+o[1]+'g)');g-=o[1];}if(parts.length>=4)break;}
  if(!parts.length)parts.push('1 scoop whey (24g)');return 'Coba: '+parts.join(' + ');}
function fiberSuggestion(gap){const opts=[['1 apel',4.4],['50g oat',5.3],['100g alpukat',6.7],['1 mangkok brokoli',2.6],['1 pisang',3.1]];
  let g=gap,parts=[];for(const o of opts){if(g>0&&parts.length<4){parts.push(o[0]+' ('+o[1]+'g)');g-=o[1];}}return 'Coba: '+parts.join(' + ');}
function coachInner(){const pf=state.profile,t=dayTotals(curDate),d=getDay(curDate),burned=dayBurned(curDate);
  const tips=[];
  const pGap=Math.round(pf.pTarget-t.p);if(pGap>=10)tips.push(['🥩','Protein kurang '+pGap+'g',proteinSuggestion(pGap)]);
  const fGap=Math.round(pf.fiberTarget-t.fib);if(fGap>=5)tips.push(['🥗','Serat kurang '+fGap+'g',fiberSuggestion(fGap)]);
  if(burned<=0&&isToday(curDate))tips.push(['🏃','Belum olahraga hari ini','Minimal jalan kaki 30 menit Zone 2 (±150 kcal) — fat-burning tanpa masuk glikogen. Atau sepeda santai 45 mnt di 11–13 kph, atau renang easy 30 mnt.']);
  const wGap=pf.waterTarget-num(d.water);if(wGap>=300)tips.push(['💧','Air kurang '+wGap+'ml','Minum '+Math.ceil(wGap/250)+' gelas (250ml) lagi.']);
  if(t.s>pf.sugarLimit)tips.push(['🍬','Gula lebih '+Math.round(t.s-pf.sugarLimit)+'g','Sudah lewat batas — rem minuman & camilan manis hari ini.']);
  if(t.na>pf.sodiumLimit)tips.push(['🧂','Natrium lebih '+Math.round(t.na-pf.sodiumLimit)+'mg','Kurangi makanan olahan/asin & saus instan.']);
  const net=Math.round(t.cal-burned);if(net>pf.calTarget+150)tips.push(['⚖️','Kalori lebih '+(net-pf.calTarget)+' kkal','Tambah kardio ringan atau kecilkan porsi makan berikutnya.']);
  const head='<div class="card-t" style="color:var(--green2)">🎯 Saran Coach Hari Ini</div>';
  const aiBtn='<button class="btn btn-2 btn-sm" onclick="go(\'ai\')" style="margin-top:10px;color:var(--blue)">🤖 Tanya Coach AI untuk analisa lengkap</button>';
  if(!tips.length)return head+'<div style="font-size:13px;color:var(--green2);line-height:1.6">✅ Mantap! Semua target hari ini sudah aman. Pertahankan — konsistensi inilah yang bikin hasil jangka panjang. 💪</div>'+aiBtn;
  return head+tips.map(x=>`<div style="display:flex;gap:10px;margin-bottom:10px"><div style="font-size:18px;flex-shrink:0">${x[0]}</div>
    <div><div style="font-weight:700;font-size:13px;color:var(--txt)">${x[1]}</div>
    <div style="font-size:12px;color:var(--txt2);line-height:1.5;margin-top:2px">${x[2]}</div></div></div>`).join('')+aiBtn;}

/* ---- Streaks & Zone ---- */
function streakCount(test){let n=0;const t=new Date();
  for(let i=0;i<400;i++){const ds=todayStr(new Date(t.getFullYear(),t.getMonth(),t.getDate()-i));
    if(test(ds))n++;else if(i===0)continue;else break;}return n;}
function streakStrip(){const pf=state.profile;
  const sLog=streakCount(d=>{const day=state.days[d];return day&&(day.foods||[]).length>0;});
  const sProt=streakCount(d=>dayTotals(d).p>=pf.pTarget*0.9);
  const sAct=streakCount(d=>dayBurned(d)>0);
  const items=[['📝',sLog,'catat'],['🥩',sProt,'protein'],['🔥',sAct,'olahraga']];
  return `<div style="display:flex;gap:8px;margin-bottom:14px">${items.map(i=>`
    <div style="flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center">
      <div style="font-size:20px;font-weight:800;color:${i[1]>0?'var(--amber2)':'var(--txt3)'}">${i[1]>0?'🔥'+i[1]:'0'}</div>
      <div style="font-size:10px;color:var(--txt3);margin-top:1px">${i[2]}</div></div>`).join('')}</div>`;}
function estZone(cal,mins){if(!mins||!cal)return null;const r=cal/mins;
  if(r<6)return['🟢','Aerobik · Fat-burn','var(--green2)'];
  if(r<=10)return['🟡','Tempo · 50/50','var(--amber2)'];
  return['🔴','Anaerob · Glikogen','var(--red)'];}

/* ---- PPL Program ---- */
function pplCard(){const d=getDay(curDate);const did=(d.activities||[]).map(a=>a.nm.toLowerCase());
  const done=n=>did.some(x=>x.includes(n));
  const tag=k=>done(k)?' <span style="color:var(--green2)">✓</span>':'';
  return `<div class="card" style="background:linear-gradient(135deg,#14101e,#100e16);border-color:#2a2042">
    <div class="card-t" style="color:var(--purple)">💪 Program Latihan — Push / Pull / Legs</div>
    <div style="font-size:12.5px;color:var(--txt2);line-height:1.8">
      <b style="color:var(--txt)">🔼 Push</b>${tag('push')} — dada, bahu, trisep · <span style="color:var(--txt3)">Bench Press, Overhead Press</span><br>
      <b style="color:var(--txt)">🔽 Pull</b>${tag('pull')} — punggung, bisep · <span style="color:var(--txt3)">Deadlift, Row</span><br>
      <b style="color:var(--txt)">🦵 Legs</b>${tag('leg')} — kaki · <span style="color:var(--txt3)">Back Squat</span><br>
      <span style="color:var(--txt3);font-size:11.5px">3×/minggu · 3-4 set × 6-12 rep · RIR 1-3 (jangan selalu failure) · progressive overload tiap minggu</span>
    </div>
    <div class="chips" style="margin-top:10px">
      <button class="chip" onclick="logPPL('Push Day')">+ Push Day</button>
      <button class="chip" onclick="logPPL('Pull Day')">+ Pull Day</button>
      <button class="chip" onclick="logPPL('Leg Day')">+ Leg Day</button>
    </div>
    <div class="note" style="margin-top:10px">🚴 Gabung dengan sepeda: <b>beban dulu</b> kalau sehari (riset Alcaraz/Wilson), atau pisah hari. Hindari Leg Day persis sebelum long ride. Catat detail set/beban di Hevy → lihat panduan lengkap di tab Riset.</div>
  </div>`;}
function logPPL(nm){openActivityModal();setTimeout(()=>{const el=document.getElementById('am_nm');if(el){el.value=nm;el.focus();}},40);}

/* ---- Activities ---- */
function getRecentActivities(){const seen={},res=[];
  state.customActivities.forEach(a=>{if(!seen[a.nm]){seen[a.nm]=1;res.push({nm:a.nm,cal:num(a.cal),steps:num(a.steps)});}});
  const dates=Object.keys(state.days).sort().reverse();
  for(const dt of dates){for(const a of (getDay(dt).activities||[]).slice().reverse()){
    if(!seen[a.nm]){seen[a.nm]=1;res.push({nm:a.nm,cal:Math.round(num(a.cal)),steps:Math.round(num(a.steps))});}
    if(res.length>=10)return res;}}
  return res;}
function openActivityModal(){const recent=getRecentActivities();
  showModal(`
    <div class="modal-h"><h3>🔥 Tambah Kegiatan</h3><button class="modal-x" onclick="closeModal()">×</button></div>
    <div style="font-size:12px;color:var(--txt3);margin-bottom:14px">Untuk ${isToday(curDate)?'hari ini':fmtDate(curDate)}</div>
    ${recent.length?`<div class="card-t">🕐 Kegiatan tersimpan / sering</div>
      <div style="margin-bottom:14px">${recent.map(a=>`
        <div class="food-db-item" onclick='quickAddActivity(${JSON.stringify(a).replace(/'/g,"&#39;")})'>

            <div style="font-size:11px;color:var(--txt3)">${a.steps?'👟 '+a.steps.toLocaleString('id-ID')+' langkah':'tanpa langkah'}</div></div>
          <div style="color:var(--orange);font-weight:700">🔥${a.cal} <span style="color:var(--green2);font-size:18px">+</span></div>
        </div>`).join('')}</div>`:''}
    <div class="card-t">✏️ Kegiatan baru</div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:6px">Pilih cepat (isi nama):</div>
    <div class="chips" style="margin-bottom:12px">
      ${[['🚴','Sepeda'],['🏊','Renang'],['🚶','Jalan kaki'],['🏃','Lari'],['🔼','Push Day'],['🔽','Pull Day'],['🦵','Leg Day'],['💪','Gym'],['🪜','Naik tangga'],['🛶','Rowing'],['🪢','Lompat tali'],['🧘','Yoga']].map(s=>`<button class="chip" onclick="document.getElementById('am_nm').value='${s[1]}';document.getElementById('am_nm').focus()">${s[0]} ${s[1]}</button>`).join('')}
    </div>
    <div class="field"><label>Nama kegiatan</label><input id="am_nm" placeholder="cth: Sepeda sore / Renang / Caroline Girvan Day 1"></div>
    <div class="grid2">
      <div class="field"><label>Kalori dibakar (kkal)</label><input id="am_cal" type="number" inputmode="numeric" placeholder="0" oninput="updZone()"></div>
      <div class="field"><label>Durasi (menit)</label><input id="am_mins" type="number" inputmode="numeric" placeholder="0" oninput="updZone()"></div>
      <div class="field"><label>Jarak (km) — opsional</label><input id="am_km" type="number" inputmode="decimal" placeholder="0"></div>
      <div class="field"><label>Langkah — opsional</label><input id="am_steps" type="number" inputmode="numeric" placeholder="0"></div>
    </div>
    <div id="am_zone" style="margin-bottom:12px"></div>
    <div class="field"><label style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="am_save" style="width:auto"> Simpan kegiatan ini untuk dipakai lagi</label></div>
    <button class="btn" onclick="addActivityFromModal()">+ Tambah ke Hari Ini</button>
    <div class="note" style="margin-top:12px">💡 Isi durasi untuk lihat estimasi zona. Sumber data: Garmin/Strava/Hevy. Target fat-burn: zona 🟢 (intensitas bisa kamu tahan 2 jam).</div>
  `);}
function updZone(){const cal=num(document.getElementById('am_cal').value),mins=num(document.getElementById('am_mins').value);
  const z=estZone(cal,mins);const el=document.getElementById('am_zone');if(!el)return;
  el.innerHTML=z?`<div style="background:${z[2]}18;border:1px solid ${z[2]}55;border-radius:9px;padding:9px;font-size:12px">Estimasi zona: <b style="color:${z[2]}">${z[0]} ${z[1]}</b> · ${(cal/mins).toFixed(1)} kkal/mnt${z[1].includes('Anaerob')?' ⚠️ terlalu intens untuk fat-burning optimal':z[1].includes('Aerobik')?' ✅ ideal untuk bakar lemak':''}</div>`:'';}
function quickAddActivity(a){getDay().activities.push({nm:a.nm,cal:num(a.cal),steps:num(a.steps),mins:num(a.mins),km:num(a.km)});
  save();closeModal();render();showToast('✅ '+a.nm+' ditambahkan');}
function addActivityFromModal(){const nm=document.getElementById('am_nm').value.trim();
  if(!nm){showToast('⚠️ Isi nama kegiatan');return;}
  const item={nm,cal:num(document.getElementById('am_cal').value),steps:num(document.getElementById('am_steps').value),
    mins:num(document.getElementById('am_mins').value),km:num(document.getElementById('am_km').value)};
  getDay().activities.push(item);
  if(document.getElementById('am_save').checked){
    if(!state.customActivities.find(x=>x.nm===nm))state.customActivities.unshift({...item});}
  save();closeModal();render();showToast('✅ Kegiatan ditambahkan');}
function delActivity(i){getDay().activities.splice(i,1);save();render();}
function delCustomActivity(nm){state.customActivities=state.customActivities.filter(a=>a.nm!==nm);save();render();showToast('Dihapus');}

function getRecentFoods(){const seen={},res=[];const dates=Object.keys(state.days).sort().reverse();

function quickAdd(f){getDay().foods.push({nm:f.nm,cal:num(f.cal),p:num(f.p),c:num(f.c),f:num(f.f),s:num(f.s),na:num(f.na),fib:num(f.fib)});

/* ============ PROGRESS ============ */

  const calData=dates.map(d=>Math.round(dayTotals(d).cal-dayBurned(d)));

    </div>

    <button class="btn btn-g btn-sm" onclick="openWeightModal()" style="margin-bottom:16px">⚖️ Catat Berat & Lingkar Perut</button>

    ${predictionCard()}
    ${weeklyTrainingCard()}
    ${achievementsCard()}

    ${weights.length>1?`
    <div class="chart-box">
      <div class="chart-title"><span>⚖️ Tren Berat (kg)</span><span class="avg">${weights[weights.length-1]}kg terkini</span></div>
      ${lineChart(weights,wDates.map(d=>parseDate(d).getDate()),'var(--amber2)',false)}
    </div>`:''}
    ${waists.length>1?`
    <div class="chart-box">
      <div class="chart-title"><span>📏 Tren Lingkar Perut (cm)</span><span class="avg">${waists[waists.length-1]}cm terkini</span></div>
      ${lineChart(waists,waistDates.map(d=>parseDate(d).getDate()),'var(--purple)',false)}
    </div>`:''}

    <div class="rangebtns">
      <button class="${chartRange===7?'on':''}" onclick="setRange(7)">7 hari</button>
      <button class="${chartRange===14?'on':''}" onclick="setRange(14)">14 hari</button>
      <button class="${chartRange===30?'on':''}" onclick="setRange(30)">30 hari</button>

    <div class="chart-box">
      <div class="chart-title"><span>🔥 Kalori Net</span><span class="avg">rata ${avg(calData)} · target ${pf.calTarget}</span></div>

      <div class="chart-title"><span>💪 Protein (g)</span><span class="avg">rata ${avg(pData)} · target ${pf.pTarget}</span></div>

}
function setRange(r){chartRange=r;render();}
function lastNDates(n){const res=[];const t=new Date();for(let i=n-1;i>=0;i--){const d=new Date(t);d.setDate(d.getDate()-i);res.push(todayStr(d));}return res;}

function predictionCard(){const pf=state.profile;
  const wDates=Object.keys(state.days).filter(d=>state.days[d].weight).sort();
  if(wDates.length<2)return '';
  const first=wDates[0],last=wDates[wDates.length-1];
  const w0=num(state.days[first].weight),w1=num(state.days[last].weight);
  const days=(parseDate(last)-parseDate(first))/86400000||1;
  const ratePerWeek=(w1-w0)/days*7;
  const cur=w1,target=num(pf.targetWeight);const remaining=cur-target;
  let msg,col;

/* COMPACT charts — controlled height so not too tall in portrait, baseline at 0 */
function barChart(data,labels,color,target){
  const W=520,H=150,padL=8,padR=8,padT=10,padB=20;
  const max=Math.max(target*1.15,...data,1);
  const innerW=W-padL-padR,innerH=H-padT-padB;
  const n=data.length;const gap=n>20?1.5:3;const bw=(innerW-gap*(n-1))/n;
  let bars='',lbls='';
  data.forEach((v,i)=>{const x=padL+i*(bw+gap);const h=v/max*innerH;const y=padT+innerH-h;
    const col=target&&v>target&&(color==='var(--red)')?'var(--red)':color;
    bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(h,0).toFixed(1)}" rx="2" fill="${col}" opacity="${v>0?.92:.25}"/>`;
    if(n<=14||i%Math.ceil(n/10)===0)lbls+=`<text x="${(x+bw/2).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#5a6374" font-size="9">${labels[i]}</text>`;
  });
  const ty=padT+innerH-(target/max*innerH);
  const tline=target?`<line x1="${padL}" y1="${ty.toFixed(1)}" x2="${W-padR}" y2="${ty.toFixed(1)}" stroke="#e0a850" stroke-width="1" stroke-dasharray="4 4" opacity=".55"/>`:'';
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:150px">
    <line x1="${padL}" y1="${padT+innerH}" x2="${W-padR}" y2="${padT+innerH}" stroke="#2a3140" stroke-width="1"/>
    ${tline}${bars}${lbls}
  </svg>`;
}
function lineChart(data,labels,color,fromZero){
  const W=520,H=140,padL=30,padR=10,padT=12,padB=20;
  const innerW=W-padL-padR,innerH=H-padT-padB;
  let min=Math.min(...data),max=Math.max(...data);
  if(fromZero)min=0;
  const range=max-min||1;const pmin=min-range*0.12,pmax=max+range*0.12;const prange=pmax-pmin;
  const n=data.length;
  const pts=data.map((v,i)=>{const x=padL+(n===1?innerW/2:i/(n-1)*innerW);const y=padT+innerH-((v-pmin)/prange*innerH);return[x,y];});
  let path='';pts.forEach((p,i)=>{path+=(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)+' ';});
  let area=path+`L ${pts[pts.length-1][0].toFixed(1)} ${(padT+innerH)} L ${pts[0][0].toFixed(1)} ${(padT+innerH)} Z`;
  let dots='',lbls='';
  pts.forEach((p,i)=>{if(n<=14||i%Math.ceil(n/8)===0||i===n-1){
    dots+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="${color}"/>`;
    lbls+=`<text x="${p[0].toFixed(1)}" y="${H-5}" text-anchor="middle" fill="#5a6374" font-size="9">${labels[i]}</text>`;}});
  const yLbls=`<text x="4" y="${padT+5}" fill="#5a6374" font-size="9">${max.toFixed(0)}</text>
    <text x="4" y="${padT+innerH}" fill="#5a6374" font-size="9">${min.toFixed(0)}</text>`;
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:140px">
    <defs><linearGradient id="g_${color.replace(/[^a-z]/gi,'')}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="${color}" stop-opacity=".25"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#g_${color.replace(/[^a-z]/gi,'')})"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${lbls}${yLbls}
  </svg>`;
}

function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();
  [0,0.25].forEach(t=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.type='sine';g.gain.setValueAtTime(0.0001,ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+t+0.18);
    o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+0.2);});}catch(e){}}

function renderPapers(){const order={S:0,A:1,B:2};

  s+=`Profil: target ${pf.calTarget} kkal/hari, protein ${pf.pTarget}g, serat ${pf.fiberTarget}g, air ${pf.waterTarget}ml, gula <${pf.sugarLimit}g, natrium <${pf.sodiumLimit}mg. Berat sekarang ${lastWeight()}kg, target ${pf.targetWeight}kg, TDEE ~${tdee()}.\n`;
  if(scope==='today'){const t=dayTotals(curDate);const d=getDay(curDate);const b=dayBurned(curDate);
    s+=`\nDATA HARI INI (${curDate}):\nKalori masuk: ${Math.round(t.cal)}, dibakar olahraga: ${Math.round(b)}, net: ${Math.round(t.cal-b)}.\n`;
    s+=`Protein ${Math.round(t.p)}g, Karbo ${Math.round(t.c)}g, Lemak ${Math.round(t.f)}g, Gula ${Math.round(t.s)}g, Serat ${Math.round(t.fib)}g, Natrium ${Math.round(t.na)}mg, Air ${num(d.water)}ml.\n`;
    s+=`Makanan: ${(d.foods||[]).map(f=>f.nm).join(', ')||'belum ada'}.\n`;
    s+=`Aktivitas: ${(d.activities||[]).map(a=>a.nm+' ('+Math.round(num(a.cal))+'kkal'+(num(a.mins)?', '+num(a.mins)+'mnt':'')+')').join(', ')||'belum ada'}.\n`;
  }else{const n=parseInt(scope,10);const dates=lastNDates(n);
    let cal=0,p=0,fib=0,wat=0,logged=0,totBurn=0,actCount=0;
    dates.forEach(dt=>{const t=dayTotals(dt);const d=getDay(dt);if((d.foods||[]).length){logged++;cal+=t.cal;p+=t.p;fib+=t.fib;}wat+=num(d.water);totBurn+=dayBurned(dt);actCount+=(d.activities||[]).length;});
    const div=logged||1;
    s+=`\nRINGKASAN ${n} HARI TERAKHIR:\nHari tercatat: ${logged}/${n}.\nRata-rata (hari tercatat): kalori masuk ${Math.round(cal/div)}, protein ${Math.round(p/div)}g, serat ${Math.round(fib/div)}g.\nRata-rata air: ${Math.round(wat/n)}ml/hari.\nTotal kalori olahraga dibakar: ${Math.round(totBurn)}, jumlah sesi: ${actCount}.\n`;
    const wDates=Object.keys(state.days).filter(d=>state.days[d].weight).sort();
    if(wDates.length>=2){const first=num(state.days[wDates[0]].weight),last=num(state.days[wDates[wDates.length-1]].weight);
      s+=`Berat: ${first}kg → ${last}kg (${(last-first).toFixed(1)}kg) selama ${wDates.length} pencatatan.\n`;}
  }
  return s;}
function aiPrompt(scope){return `Kamu adalah pelatih diet & kebugaran ahli yang berbasis bukti ilmiah, suportif, dan memotivasi. Pengguna sedang body recomposition (turun lemak + jaga/bangun otot), seorang pesepeda aktif (~200km/minggu) yang juga menjalankan program latihan beban Push/Pull/Legs 3x/minggu. Perhatikan concurrent training (jangan sampai over-training; recovery, tidur, protein penting). Bahasa: Indonesia santai tapi informatif.

Berdasarkan data berikut, beri analisa singkat (maksimal 5 paragraf pendek): (1) apa yang sudah bagus, (2) gap/masalah utama, (3) 2-3 saran konkret & actionable (sebut makanan/olahraga spesifik), (4) satu kalimat motivasi. Hindari basa-basi, fokus actionable. Jangan pakai markdown heading, cukup teks biasa dengan emoji secukupnya.

${buildAIData(scope)}`;}

async function askAI(scope){if(aiBusy)return;const cfg=loadAICfg();const mode=cfg.mode||'serverless';
  aiBusy=true;aiResult='';render();
  const prompt=aiPrompt(scope);let text='';
  try{
    if(mode==='direct'){
      if(!cfg.key){throw new Error('API key belum diisi');}
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+(cfg.model||'gemini-2.0-flash')+':generateContent?key='+encodeURIComponent(cfg.key),
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
      const data=await r.json();
      if(data.error)throw new Error(data.error.message||'Error Gemini');
      text=data?.candidates?.[0]?.content?.parts?.[0]?.text||'Tidak ada respons.';
    }else{
      const r=await fetch('/.netlify/functions/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
      if(!r.ok){const tx=await r.text();throw new Error('Serverless belum aktif/error ('+r.status+'). Pastikan file netlify/functions/ai.js & GEMINI_API_KEY sudah diset. '+tx.slice(0,120));}
      const data=await r.json();
      if(data.error)throw new Error(data.error);
      text=data.text||'Tidak ada respons.';
    }
    aiResult='<div style="font-size:14px;line-height:1.7;color:var(--txt);white-space:pre-wrap">'+esc(text)+'</div><div style="font-size:11px;color:var(--txt3);margin-top:12px">🤖 Dianalisa oleh Gemini · bukan nasihat medis</div>';
  }catch(e){
    aiResult='<div style="color:var(--red);font-size:13px;line-height:1.6">⚠️ Gagal: '+esc(String(e.message||e))+'</div><div style="font-size:12px;color:var(--txt3);margin-top:8px">Cek pengaturan AI di bawah, atau coba metode "API key langsung".</div>';
  }
  aiBusy=false;render();}

function toggleSyncGuide(){document.getElementById('syncGuide').classList.toggle('hide');}
function saveSync(){const code=document.getElementById('syncCodeInput').value.trim();
  const config=document.getElementById('syncConfigInput').value.trim();
  if(!code||!config){showToast('⚠️ Isi kode & config');return;}
  try{JSON.parse(config);}catch(e){showToast('⚠️ Config bukan JSON valid');return;}
  saveSyncCfg({enabled:true,code,config});showToast('☁️ Mengaktifkan sync...');
  setTimeout(()=>{location.reload();},600);}
function disableSync(){const c=loadSyncCfg();c.enabled=false;saveSyncCfg(c);syncOn=false;if(unsub)unsub();
  setSync('local','Lokal');showToast('Sync dimatikan');render();}

function autoCalc(){const pf=state.profile;
  pf.name=document.getElementById('p_name').value;
  pf.startWeight=num(document.getElementById('p_sw').value);
  pf.targetWeight=num(document.getElementById('p_tw').value);
  pf.height=num(document.getElementById('p_h').value);
  pf.age=num(document.getElementById('p_age').value);
  pf.sex=document.getElementById('p_sex').value;
  pf.deficitPct=num(document.getElementById('p_def').value);
  pf.activity=parseFloat(document.getElementById('p_act').value);
  const td=tdee();pf.calTarget=Math.round(td*(1-pf.deficitPct/100));
  const w=lastWeight();pf.pTarget=Math.round(w*2.1);pf.fTarget=Math.round(w*0.8);
  const remCal=pf.calTarget-(pf.pTarget*4+pf.fTarget*9);pf.cTarget=Math.max(0,Math.round(remCal/4));
  save();render();showToast('🧮 Target dihitung: '+pf.calTarget+' kkal, '+pf.pTarget+'g protein');}
function saveTargets(){const pf=state.profile;
  pf.calTarget=num(document.getElementById('t_cal').value);pf.pTarget=num(document.getElementById('t_p').value);
  pf.cTarget=num(document.getElementById('t_c').value);pf.fTarget=num(document.getElementById('t_f').value);
  pf.sugarLimit=num(document.getElementById('t_s').value);pf.waterTarget=num(document.getElementById('t_w').value);
  pf.sodiumLimit=num(document.getElementById('t_na').value);pf.fiberTarget=num(document.getElementById('t_fib').value);
  save();showToast('✅ Target disimpan');render();}

function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;
  a.download='recomp-tracker-'+todayStr()+'.json';a.click();URL.revokeObjectURL(url);showToast('⬇ Data di-export');}
function importData(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();
  r.onload=ev=>{try{const raw=JSON.parse(ev.target.result);
    let dayCount=0;
    // Days: migrate each (handles both old "food/activity" and new "foods")
    if(raw.days&&typeof raw.days==='object'){
      Object.keys(raw.days).forEach(date=>{state.days[date]=migrateDay(raw.days[date]);dayCount++;});
    }
    // Legacy top-level weights[] -> into the matching day
    if(Array.isArray(raw.weights)){
      raw.weights.forEach(wt=>{const date=wt.d||wt.date;if(!date)return;
        if(!state.days[date])state.days[date]={foods:[],water:0,activities:[],weight:null,waist:null};
        if(wt.w!=null)state.days[date].weight=num(wt.w);
        if(wt.weight!=null)state.days[date].weight=num(wt.weight);
        if(wt.waist!=null)state.days[date].waist=num(wt.waist);});
      // set start weight to earliest recorded if still default
      const sorted=raw.weights.filter(w=>w.w!=null||w.weight!=null).sort((a,b)=>String(a.d).localeCompare(String(b.d)));
      if(sorted.length)state.profile.startWeight=num(sorted[0].w!=null?sorted[0].w:sorted[0].weight);
    }
    // Profile (only if backup actually has one)
    if(raw.profile)state.profile=Object.assign(state.profile,raw.profile);
    // Custom foods
    if(Array.isArray(raw.customFoods))raw.customFoods.forEach(f=>{const nf=normalizeFood(f);
      if(!state.customFoods.find(x=>x.nm===nf.nm))state.customFoods.push(nf);});
    if(Array.isArray(raw.customActivities))raw.customActivities.forEach(a=>{const na=normalizeActivity(a);
      if(!state.customActivities.find(x=>x.nm===na.nm))state.customActivities.push(na);});
    if(Array.isArray(raw.expenses))raw.expenses.forEach(e=>{const ne=normalizeExpense(e);
      if(!state.expenses.find(x=>String(x.id)===String(ne.id)))state.expenses.push(ne);});
    // Reminders (only if backup has them; otherwise keep current)
    if(Array.isArray(raw.reminders)&&raw.reminders.length)state.reminders=raw.reminders;
    save();go('home');
    showToast('✅ Berhasil! '+dayCount+' hari data masuk');
  }catch(err){console.error(err);showToast('⚠️ File tidak valid / rusak');}
  finally{e.target.value='';}};r.readAsText(file);}
function resetAll(){if(confirm('Yakin hapus SEMUA data? Tidak bisa dibatalkan. Sebaiknya export dulu.')){
  state=defaultState();save();render();showToast('Data direset');}}

/* ============ MODAL / TOAST ============ */
function showModal(html){closeModal();const m=document.createElement('div');m.className='modal';m.id='modal';
  m.innerHTML='<div class="modal-c" onclick="event.stopPropagation()">'+html+'</div>';
  m.onclick=closeModal;document.body.appendChild(m);}
function closeModal(){const m=document.getElementById('modal');if(m)m.remove();}
let toastTimer;
function showToast(msg){const old=document.getElementById('toast');if(old)old.remove();
  const t=document.createElement('div');t.className='toast';t.id='toast';t.textContent=msg;
  document.body.appendChild(t);clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.remove(),2600);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
